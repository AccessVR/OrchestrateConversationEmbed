# Publish to npm via trusted publishing (OIDC) — no long-lived npm token.
#
# Prerequisites (one-time, done on npmjs.com by a maintainer):
#   1. The package must exist on npm. For a brand-new name, do ONE bootstrap
#      publish manually (`npm publish`), which creates it.
#   2. On the package's npm settings → "Trusted Publisher", add a GitHub Actions
#      publisher pointing at this repo (AccessVR/OrchestrateConversationEmbed)
#      and this workflow file (publish.yml). Optionally pin the environment below.
#
# After that, publishing every subsequent release needs no secrets: cut a GitHub
# Release and npm authenticates this job via its OIDC identity, with provenance.
#
# Trusted publishing is the replacement for automation / 2FA-bypass tokens, which
# npm is deprecating (publishing capability removed ~Jan 2027).
name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm >= 11.5.1 is required for OIDC trusted publishing; Node 22 ships npm 10.
      - run: npm install -g npm@latest

      # No dependencies to install and no build step — publish the source as-is.
      # OIDC provides auth (no NODE_AUTH_TOKEN); --provenance attests the build.
      - run: npm publish --provenance --access public
